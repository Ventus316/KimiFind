<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { musubi: '#E63946', twilight: '#1D3557', dusk: '#457B9D' } } } }
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/data.js"></script>
</head>
<body class="bg-gray-50">

    <nav class="fixed w-full z-50 bg-white/70 backdrop-blur-md shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="text-xl font-bold text-twilight tracking-widest">桃園拾物 <span class="text-musubi text-sm">KimiFind</span></a>
            <div class="hidden md:flex space-x-6 text-sm font-medium">
                <a href="search.html" class="hover:text-musubi transition-colors">失物搜尋</a>
                <a href="report.html" class="hover:text-musubi transition-colors">失物上報</a>
                <a href="guide.html" class="hover:text-musubi transition-colors">歸還認領</a>
                <a href="dashboard.html" class="hover:text-musubi transition-colors">個人後台</a>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-16 min-h-screen bg-gradient-to-b from-gray-50 to-blue-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="bg-white rounded-3xl shadow-lg overflow-hidden flex flex-col md:flex-row">
                
                <div id="detail-image-container" class="md:w-1/2 bg-gray-200 min-h-[400px] relative overflow-hidden">
                    <div class="absolute top-4 left-4 bg-musubi text-white px-4 py-1 rounded-full text-sm font-bold shadow-md">尋找中</div>
                </div>

                <div class="md:w-1/2 p-8 flex flex-col">
                    <div class="mb-6 border-b border-gray-100 pb-6">
                        <h1 class="text-3xl font-bold text-twilight mb-2">紅色結繩髮圈</h1>
                        <p class="text-gray-500 flex items-center gap-2 text-sm"><span class="text-musubi">📍 桃園火車站前站大廳</span> | 2026-06-10</p>
                    </div>
                    
                    <div class="prose text-gray-600 mb-8 flex-1">
                        <p>手工編織的紅色結繩，對失主來說是非常重要的物品，希望能盡快找回。</p>
                        <p class="text-sm mt-4 bg-gray-50 p-4 rounded-xl border border-gray-100">類別：飾品<br>行政區：桃園區</p>
                    </div>

                    <div class="mt-auto bg-blue-50/50 p-6 rounded-2xl">
                        <h4 class="font-bold text-twilight mb-4">留下一道星軌 (留言)</h4>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="comment-input" placeholder="請問在哪裡可以面交？" class="flex-1 px-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:border-musubi text-sm">
                            <button class="bg-twilight text-white px-6 py-2 rounded-xl font-bold hover:bg-gray-800 text-sm">發送</button>
                        </div>
                        <div id="comment-list" class="space-y-3">
                            <div class="bg-white p-3 rounded-xl shadow-sm text-sm text-gray-700">
                                <span class="font-bold text-musubi">路人甲：</span> 我好像在售票機旁邊有看到！
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-twilight text-white text-center py-6 text-sm">
        <p>&copy; 2026 桃園拾物 KimiFind. All rights reserved.</p>
    </footer>

    <script src="js/detail.js"></script>
</body>
</html>
