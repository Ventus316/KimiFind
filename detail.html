<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { musubi: '#E63946', twilight: '#1D3557', dusk: '#457B9D' } } } }
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/data.js"></script>
    
    <script src="js/nav.js" defer></script>
</head>
<body class="bg-gray-50">
    <div id="nav-placeholder"></div>

    <main class="pt-24 pb-16 min-h-screen bg-gradient-to-b from-gray-50 to-blue-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="mb-4">
                <button onclick="history.back()" class="flex items-center text-gray-500 hover:text-musubi font-bold transition group">
                    <svg class="w-5 h-5 mr-1 transform group-hover:-translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    返回上一頁
                </button>
            </div>
            <div class="bg-white rounded-3xl shadow-lg overflow-hidden flex flex-col md:flex-row">
                
                <div id="detail-image-container" class="md:w-1/2 bg-gray-200 min-h-[400px] relative overflow-hidden">
                    <div class="absolute top-4 left-4 bg-musubi text-white px-4 py-1 rounded-full text-sm font-bold shadow-md">尋找中</div>
                </div>

                <div class="md:w-1/2 p-8 flex flex-col">
                    <div class="mb-6 border-b border-gray-100 pb-6">
                        <h1 class="text-3xl font-bold text-twilight mb-2">紅色結繩髮圈</h1>
                        <p class="text-gray-500 flex items-center gap-2 text-sm"><span class="text-musubi">📍 桃園火車站前站大廳</span> | 2026-06-10</p>
                    </div>
                    
                    <div class="prose text-gray-600 mb-8 flex-1">
                        <p>手工編織的紅色結繩，對失主來說是非常重要的物品，希望能盡快找回。</p>
                        <p class="text-sm mt-4 bg-gray-50 p-4 rounded-xl border border-gray-100">類別：飾品<br>行政區：桃園區</p>
                    </div>

                    <div class="flex items-center gap-4 mb-8 border-t border-gray-100 pt-6">
                        <button id="like-btn" class="flex items-center gap-2 px-6 py-2 rounded-full border border-gray-200 text-gray-500 hover:text-musubi hover:border-musubi hover:bg-red-50 transition font-bold text-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                            <span class="like-text">點讚</span>
                        </button>
                        
                        <button id="bookmark-btn" class="flex items-center gap-2 px-6 py-2 rounded-full border border-gray-200 text-gray-500 hover:text-twilight hover:border-twilight hover:bg-blue-50 transition font-bold text-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
                            <span class="bookmark-text">收藏</span>
                        </button>
                    </div>

                    <div class="mt-auto bg-blue-50/50 p-6 rounded-2xl">
                        <h4 class="font-bold text-twilight mb-4">留下一道星軌 (留言)</h4>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="comment-input" placeholder="請問在哪裡可以面交？" class="flex-1 px-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:border-musubi text-sm">
                            <button class="bg-twilight text-white px-6 py-2 rounded-xl font-bold hover:bg-gray-800 text-sm">發送</button>
                        </div>
                        <div id="comment-list" class="space-y-3">
                            <div class="bg-white p-3 rounded-xl shadow-sm text-sm text-gray-700">
                                <span class="font-bold text-musubi">路人甲：</span> 我好像在售票機旁邊有看到！
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-twilight text-white text-center py-6 text-sm">
        <p>&copy; 2026 桃園拾物 KimiFind. All rights reserved.</p>
    </footer>

    <script src="js/detail.js"></script>
</body>
</html>
