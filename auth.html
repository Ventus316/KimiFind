<main class="min-h-screen flex items-center justify-center bg-gradient-to-br from-twilight via-dusk to-blue-200 px-4 pt-16">
        <div class="w-full max-w-md bg-white/80 backdrop-blur-lg p-8 rounded-3xl shadow-2xl border border-white/50">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-twilight tracking-widest mb-2">登入 KimiFind</h1>
                <p class="text-sm text-gray-600">找回你遺落的時光</p>
            </div>

            <form class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">電子郵件</label>
                    <input type="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-musubi bg-white/50" placeholder="your@email.com">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">密碼</label>
                    <input type="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-musubi bg-white/50" placeholder="••••••••">
                </div>
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center text-gray-600 cursor-pointer">
                        <input type="checkbox" class="mr-2 rounded text-musubi focus:ring-musubi"> 記住我
                    </label>
                    <a href="#" class="text-musubi hover:underline font-bold">忘記密碼？</a>
                </div>
                <button type="button" class="w-full py-3 bg-twilight text-white font-bold rounded-xl shadow-md hover:bg-gray-800 transition transform hover:-translate-y-0.5">
                    登入
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-600">
                還沒有帳號嗎？ <a href="#" class="text-musubi font-bold hover:underline">立即註冊</a>
            </div>
        </div>
    </main>
