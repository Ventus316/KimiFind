<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { musubi: '#E63946', twilight: '#1D3557', dusk: '#457B9D' } } } }
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/data.js"></script>
</head>
<body class="bg-gray-50">

    <nav class="fixed w-full z-50 bg-white/70 backdrop-blur-md shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="text-xl font-bold text-twilight tracking-widest">桃園拾物 <span class="text-musubi text-sm">KimiFind</span></a>
            <div class="hidden md:flex space-x-6 text-sm font-medium">
                <a href="search.html" class="hover:text-musubi transition-colors">失物搜尋</a>
                <a href="report.html" class="hover:text-musubi transition-colors">失物上報</a>

    <main class="pt-24 pb-16 min-h-screen bg-white">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16 max-w-3xl mx-auto">
                <h1 class="text-4xl font-bold text-twilight mb-6">關於 KimiFind</h1>
                <p class="text-lg text-gray-600 leading-relaxed">
                    我們是元智大學資訊傳播學系的學生團隊。在校園與桃園的日常移動中，我們發現遺失物品是許多人的痛點。因此，我們結合了《你的名字》中「結」的概念，打造了這個在地化的媒合平台，希望能讓每一份遺落的心意，都能像彗星一樣準確地回到主人的軌道上。
                </p>
            </div>

            <h2 class="text-2xl font-bold text-center text-twilight mb-10">開發團隊</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-8">
                <div class="text-center group">
                    <div class="w-32 h-32 mx-auto bg-gray-200 rounded-full mb-4 overflow-hidden border-4 border-white shadow-lg group-hover:border-musubi transition duration-300">
                        <div class="w-full h-full bg-gradient-to-br from-twilight to-dusk"></div>
                    </div>
                    <h3 class="font-bold text-lg text-gray-800">李柏融</h3>
                    <p class="text-sm text-musubi font-bold mb-2">組長 / 專案統籌</p>
                </div>
                <div class="text-center group">
                    <div class="w-32 h-32 mx-auto bg-gray-200 rounded-full mb-4 overflow-hidden border-4 border-white shadow-lg group-hover:border-musubi transition duration-300">
                        <div class="w-full h-full bg-gradient-to-br from-twilight to-dusk"></div>
                    </div>
                    <h3 class="font-bold text-lg text-gray-800">陳郁璿</h3>
                    <p class="text-sm text-gray-500 mb-2">前端視覺設計</p>
                </div>
                <div class="text-center group">
                    <div class="w-32 h-32 mx-auto bg-gray-200 rounded-full mb-4 overflow-hidden border-4 border-white shadow-lg group-hover:border-musubi transition duration-300">
                        <div class="w-full h-full bg-gradient-to-br from-twilight to-dusk"></div>
                    </div>
                    <h3 class="font-bold text-lg text-gray-800">陳晉達</h3>
                    <p class="text-sm text-gray-500 mb-2">互動邏輯開發</p>
                </div>
                <div class="text-center group">
                    <div class="w-32 h-32 mx-auto bg-gray-200 rounded-full mb-4 overflow-hidden border-4 border-white shadow-lg group-hover:border-musubi transition duration-300">
                        <div class="w-full h-full bg-gradient-to-br from-twilight to-dusk"></div>
                    </div>
                    <h3 class="font-bold text-lg text-gray-800">李忻育</h3>
                    <p class="text-sm text-gray-500 mb-2">介面與內容整合</p>
                </div>
