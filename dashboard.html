<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { musubi: '#E63946', twilight: '#1D3557', dusk: '#457B9D' } } } }
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/data.js"></script>
    
    <script src="js/nav.js" defer></script>
</head>
<body class="bg-gray-50">
    <div id="nav-placeholder"></div>

    <main class="pt-24 pb-16 min-h-screen bg-gray-50">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-3xl font-bold text-twilight">個人管理後台</h1>
                <div class="bg-white px-4 py-2 rounded-full shadow-sm text-sm font-bold text-gray-600">
                    目前身分：<span id="role-badge">一般用戶</span>
                </div>
            </div>

            <div class="flex gap-4 mb-6 border-b border-gray-200 pb-2" id="dashboard-tabs">
                <button class="tab-btn active text-musubi font-bold border-b-2 border-musubi pb-2 px-2" data-type="遺失">我發布的協尋 (遺失)</button>
                <button class="tab-btn text-gray-400 font-bold hover:text-gray-600 pb-2 px-2 transition" data-type="拾獲">我登記的招領 (拾獲)</button>
                <button class="tab-btn text-gray-400 font-bold hover:text-gray-600 pb-2 px-2 transition" data-type="收藏">收藏的物品</button>
            </div>

            <div id="dashboard-list" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden min-h-[200px]">
                </div>
        </div>
    </main>

    <div id="edit-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-twilight/40 backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md mx-4 transform scale-95 transition-transform duration-300" id="edit-modal-content">
            <h3 class="text-2xl font-bold text-twilight mb-6 text-center">修改物品資訊</h3>
            
            <input type="hidden" id="edit-id"> <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-2">物品名稱</label>
                <input type="text" id="edit-name" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-musubi">
            </div>
            
            <div class="mb-8">
                <label class="block text-sm font-bold text-gray-700 mb-2">詳細特徵描述</label>
                <textarea id="edit-desc" rows="4" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-musubi"></textarea>
            </div>
            
            <div class="flex justify-end gap-3">
                <button type="button" id="cancel-edit-btn" class="px-5 py-3 rounded-xl text-gray-500 hover:bg-gray-100 font-bold transition">取消</button>
                <button type="button" id="save-edit-btn" class="px-5 py-3 rounded-xl bg-musubi text-white font-bold hover:bg-red-600 shadow-md transition">儲存修改</button>
            </div>
        </div>
    </div>

    <footer class="bg-twilight text-white text-center py-6 text-sm">
        <p>&copy; 2026 桃園拾物 KimiFind. All rights reserved.</p>
    </footer>

    <script src="js/dashboard.js"></script>
</body>
</html>
