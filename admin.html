<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { musubi: '#E63946', twilight: '#1D3557', dusk: '#457B9D' } } } }
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/data.js"></script>
    
    <script src="js/nav.js" defer></script>
</head>
<body class="bg-gray-50">
    <div id="nav-placeholder"></div>

    <main class="pt-24 pb-16 min-h-screen bg-gray-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-3xl font-bold text-twilight">系統管理員後台</h1>
                <div class="bg-musubi text-white px-4 py-2 rounded-full shadow-sm text-sm font-bold">
                    最高權限
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                    <h2 class="font-bold text-gray-700">全站貼文管理</h2>
                    <input type="text" placeholder="搜尋 ID 或關鍵字" class="px-4 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-twilight">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-white border-b border-gray-100 text-sm text-gray-500">
                                <th class="p-4 font-medium">物品 ID</th>
                                <th class="p-4 font-medium">物品名稱</th>
                                <th class="p-4 font-medium">發布者</th>
                                <th class="p-4 font-medium">狀態</th>
                                <th class="p-4 font-medium text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody class="text-sm text-gray-700">
                            <tr class="border-b border-gray-50 hover:bg-gray-50">
                                <td class="p-4 text-gray-500">item_001</td>
                                <td class="p-4 font-bold text-twilight">紅色結繩髮圈</td>
                                <td class="p-4">user_twilight</td>
                                <td class="p-4"><span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs">尋找中</span></td>
                                <td class="p-4 text-right">
                                    <button class="text-red-500 hover:text-red-700 font-bold text-xs bg-red-50 px-3 py-1 rounded-lg">強制下架</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-twilight text-white text-center py-6 text-sm">
        <p>&copy; 2026 桃園拾物 KimiFind. All rights reserved.</p>
    </footer>
    
</body>
</html>
