<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { musubi: '#E63946', twilight: '#1D3557', dusk: '#457B9D' } } } }
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
    
    <script src="js/nav.js" defer></script>
</head>
<body class="bg-gray-50">
    <div id="nav-placeholder"></div>

    <main class="pt-24 pb-16 min-h-screen bg-gray-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-3xl font-bold text-twilight">系統管理員後台</h1>
                <div class="bg-musubi text-white px-4 py-2 rounded-full shadow-sm text-sm font-bold">
                    最高權限
                </div>
            </div>

            <!-- 管理員選單 Tabs -->
            <div class="flex gap-4 mb-6 border-b border-gray-200 pb-2">
                <button class="admin-tab active text-musubi font-bold border-b-2 border-musubi pb-2 px-4 transition" data-target="admin-posts">貼文管理</button>
                <button class="admin-tab text-gray-400 font-bold border-b-2 border-transparent hover:text-gray-600 pb-2 px-4 transition" data-target="admin-users">用戶管理</button>
                <button class="admin-tab text-gray-400 font-bold border-b-2 border-transparent hover:text-gray-600 pb-2 px-4 transition" data-target="admin-categories">類別管理</button>
            </div>

            <!-- 區塊 1：貼文管理 -->
            <div id="admin-posts" class="admin-section bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 bg-gray-50">
                    <h2 class="font-bold text-gray-700">全站貼文列表</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-white border-b border-gray-100 text-sm text-gray-500">
                                <th class="p-4 font-medium">物品 ID</th>
                                <th class="p-4 font-medium">物品名稱</th>
                                <th class="p-4 font-medium">發布者</th>
                                <th class="p-4 font-medium">狀態</th>
                                <th class="p-4 font-medium text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="admin-posts-tbody" class="text-sm text-gray-700">
                            <!-- 動態渲染貼文 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 區塊 2：用戶管理 -->
            <div id="admin-users" class="admin-section bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden" style="display: none;">
                <div class="p-6 border-b border-gray-100 bg-gray-50">
                    <h2 class="font-bold text-gray-700">用戶權限設定</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-white border-b border-gray-100 text-sm text-gray-500">
                                <th class="p-4 font-medium">用戶信箱</th>
                                <th class="p-4 font-medium">暱稱</th>
                                <th class="p-4 font-medium">目前身分</th>
                                <th class="p-4 font-medium text-right">權限操作</th>
                            </tr>
                        </thead>
                        <tbody id="admin-users-tbody" class="text-sm text-gray-700">
                            <!-- 動態渲染用戶 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 區塊 3：類別管理 -->
            <div id="admin-categories" class="admin-section bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden" style="display: none;">
                <div class="p-6 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                    <h2 class="font-bold text-gray-700">物品分類標籤設定</h2>
                </div>
                <div class="p-6">
                    <div class="flex gap-2 mb-6">
                        <input type="text" id="new-category-input" placeholder="輸入新類別名稱..." class="px-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:border-musubi text-sm w-64">
                        <button id="add-category-btn" class="bg-twilight text-white px-4 py-2 rounded-xl font-bold hover:bg-gray-800 text-sm transition">新增類別</button>
                    </div>
                    <div id="admin-categories-list" class="flex flex-wrap gap-3">
                        <!-- 動態渲染標籤 -->
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-twilight text-white text-center py-6 text-sm">
        <p>&copy; 2026 桃園拾物 KimiFind. All rights reserved.</p>
    </footer>
    
</body>
</html>
