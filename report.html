<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { musubi: '#E63946', twilight: '#1D3557', dusk: '#457B9D' } } } }
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/data.js"></script>
    
    <script src="js/nav.js" defer></script>
</head>
<body class="bg-gray-50">
    <div id="nav-placeholder"></div>

    <main class="pt-24 pb-16 min-h-screen bg-gray-50 flex items-center justify-center">
        <div class="w-full max-w-2xl px-4">
            <div class="bg-white p-8 md:p-12 rounded-3xl shadow-sm border border-gray-100">
                <h2 class="text-3xl font-bold text-twilight text-center mb-2">上報拾獲/遺失資訊</h2>
                <p class="text-center text-gray-500 mb-8 text-sm">每一筆登記，都有可能牽起一段失而復得的緣分。</p>

                <form class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">物品名稱</label>
                            <input type="text" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-musubi" placeholder="例如：黑框眼鏡">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">物品類別</label>
                            <select class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-musubi bg-white">
                                <option>飾品</option><option>書籍</option><option>電子產品</option><option>文具</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">拾獲/遺失地點 (行政區)</label>
                        <select class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-musubi bg-white">
                            <option>桃園區</option><option>中壢區</option><option>八德區</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">詳細特徵描述</label>
                        <textarea rows="4" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-musubi" placeholder="請描述物品的特徵、顏色、品牌等..."></textarea>
                    </div>

                    <button type="button" class="w-full py-4 bg-musubi text-white font-bold rounded-xl shadow-md hover:bg-red-600 transition text-lg mt-4">
                        送出資料
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-twilight text-white text-center py-6 text-sm">
        <p>&copy; 2026 桃園拾物 KimiFind. All rights reserved.</p>
    </footer>

    <script src="js/report.js"></script>
</body>
</html>
