<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>登入 | KimiFind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { musubi: '#E63946', twilight: '#1D3557', dusk: '#457B9D' } } } }</script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/nav.js" defer></script>
</head>
<body class="bg-gray-50">
    <div id="nav-placeholder"></div>

    <main class="min-h-screen flex items-center justify-center bg-gradient-to-br from-twilight via-dusk to-blue-200 px-4 pt-16">
        <div class="w-full max-w-md bg-white/90 backdrop-blur-lg p-8 rounded-3xl shadow-2xl">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold text-twilight tracking-widest mb-2">登入 KimiFind</h1>
                <!-- <p class="text-sm text-gray-600">測試帳號：<br> 管理員: admin@kimi.com | 一般: user@kimi.com <br> 密碼皆為: 123456</p> -->
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">電子郵件</label>
                    <input type="email" id="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-musubi" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">密碼</label>
                    <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-musubi" required>
                </div>
                
                <p id="error-msg" class="text-musubi text-sm font-bold text-center hidden">帳號或密碼錯誤！</p>
                
                <button type="submit" class="w-full py-3 bg-twilight text-white font-bold rounded-xl shadow-md hover:bg-gray-800 transition">
                    登入
                </button>
            </form>
            <div class="mt-6 text-center text-sm text-gray-600">
                還沒有帳號嗎？ <a href="register.html" class="text-musubi font-bold hover:underline">立即註冊</a>
            </div>
        </div>
    </main>

    <script>
        $(document).ready(function() {
            // 自動幫輸入框加上 autocomplete 屬性以消除瀏覽器警告
            $('#email').attr('autocomplete', 'username');
            $('#password').attr('autocomplete', 'current-password');

            $('#login-form').on('submit', function(e) {
                e.preventDefault(); 
                
                const email = $('#email').val().trim();
                const pwd = $('#password').val().trim();
                
                // 🌟 絕對防禦機制：定義永遠不會消失的預設帳號
                const defaultUsers = [
                    { email: 'admin@kimi.com', name: '超級管理員', role: 'admin', pwd: '123456' },
                    { email: 'user@kimi.com', name: '一般探索者', role: 'user', pwd: '123456' },
                    { email: 'stranger@kimi.com', name: '路人甲', role: 'user', pwd: '123456' }
                ];
                
                let allUsers = [];
                
                // 1. 安全讀取 LocalStorage (防止裡面有壞掉的資料導致網頁崩潰)
                try {
                    const storedData = localStorage.getItem('kimiAllUsers');
                    if (storedData) {
                        allUsers = JSON.parse(storedData);
                        // 如果讀出來的不是陣列，強制歸零
                        if (!Array.isArray(allUsers)) {
                            allUsers = [];
                        }
                    }
                } catch (error) {
                    console.warn("舊資料損毀，系統已自動重置");
                    allUsers = [];
                }

                // 2. 強制寫入並校正預設帳號
                defaultUsers.forEach(du => {
                    const exists = allUsers.find(u => u.email === du.email);
                    if (!exists) {
                        // 如果找不到這個預設帳號，直接加進去
                        allUsers.push(du);
                    } else if (exists.pwd !== du.pwd) {
                        // 如果帳號在，但密碼以前被亂改過，強制校正回 123456
                        exists.pwd = du.pwd;
                    }
                });
                
                // 將健康的資料庫存回瀏覽器
                localStorage.setItem('kimiAllUsers', JSON.stringify(allUsers));
                
                // 3. 驗證帳號密碼
                const matchedUser = allUsers.find(u => u.email === email && u.pwd === pwd);

                if (matchedUser) {
                    // 登入成功
                    $('#error-msg').addClass('hidden');
                    const userSession = { 
                        name: matchedUser.name, 
                        email: matchedUser.email, 
                        role: matchedUser.role 
                    };
                    localStorage.setItem('kimiUser', JSON.stringify(userSession));
                    
                    alert('登入成功！即將前往' + (matchedUser.role === 'admin' ? '管理員' : '個人') + '後台。');
                    window.location.href = matchedUser.role === 'admin' ? 'admin.html' : 'dashboard.html';
                } else {
                    // 登入失敗
                    $('#error-msg').removeClass('hidden');
                }
            });
        });
    </script>
</body>
</html>
